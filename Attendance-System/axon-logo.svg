<svg width="160" height="60" viewBox="0 0 160 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="axonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3333;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6633;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9933;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Neural network background -->
  <g opacity="0.3">
    <circle cx="20" cy="15" r="2" fill="#ff3333" filter="url(#glow)"/>
    <circle cx="40" cy="10" r="2" fill="#ff3333" filter="url(#glow)"/>
    <circle cx="60" cy="18" r="2" fill="#ff3333" filter="url(#glow)"/>
    <circle cx="80" cy="12" r="2" fill="#ff3333" filter="url(#glow)"/>
    <circle cx="100" cy="20" r="2" fill="#ff3333" filter="url(#glow)"/>
    <circle cx="120" cy="14" r="2" fill="#ff3333" filter="url(#glow)"/>
    <circle cx="140" cy="16" r="2" fill="#ff3333" filter="url(#glow)"/>
    
    <line x1="20" y1="15" x2="40" y2="10" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>
    <line x1="40" y1="10" x2="60" y2="18" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>
    <line x1="60" y1="18" x2="80" y2="12" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>
    <line x1="80" y1="12" x2="100" y2="20" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>
    <line x1="100" y1="20" x2="120" y2="14" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>
    <line x1="120" y1="14" x2="140" y2="16" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>
    
    <circle cx="30" cy="45" r="2" fill="#ff3333" filter="url(#glow)"/>
    <circle cx="50" cy="50" r="2" fill="#ff3333" filter="url(#glow)"/>
    <circle cx="70" cy="42" r="2" fill="#ff3333" filter="url(#glow)"/>
    <circle cx="90" cy="48" r="2" fill="#ff3333" filter="url(#glow)"/>
    <circle cx="110" cy="44" r="2" fill="#ff3333" filter="url(#glow)"/>
    <circle cx="130" cy="46" r="2" fill="#ff3333" filter="url(#glow)"/>
    
    <line x1="30" y1="45" x2="50" y2="50" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>
    <line x1="50" y1="50" x2="70" y2="42" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>
    <line x1="70" y1="42" x2="90" y2="48" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>
    <line x1="90" y1="48" x2="110" y2="44" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>
    <line x1="110" y1="44" x2="130" y2="46" stroke="#ff3333" stroke-width="0.5" opacity="0.6"/>
    
    <line x1="20" y1="15" x2="30" y2="45" stroke="#ff3333" stroke-width="0.3" opacity="0.4"/>
    <line x1="40" y1="10" x2="50" y2="50" stroke="#ff3333" stroke-width="0.3" opacity="0.4"/>
    <line x1="60" y1="18" x2="70" y2="42" stroke="#ff3333" stroke-width="0.3" opacity="0.4"/>
    <line x1="80" y1="12" x2="90" y2="48" stroke="#ff3333" stroke-width="0.3" opacity="0.4"/>
    <line x1="100" y1="20" x2="110" y2="44" stroke="#ff3333" stroke-width="0.3" opacity="0.4"/>
    <line x1="120" y1="14" x2="130" y2="46" stroke="#ff3333" stroke-width="0.3" opacity="0.4"/>
  </g>
  
  <!-- AXON text -->
  <text x="80" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="url(#axonGradient)" filter="url(#glow)">
    AXON
  </text>
  
  <!-- SYSTEMS text -->
  <text x="80" y="50" font-family="Arial, sans-serif" font-size="12" font-weight="normal" text-anchor="middle" fill="#ffffff">
    SYSTEMS
  </text>
</svg>
