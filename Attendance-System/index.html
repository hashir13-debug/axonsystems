function arrowSVG() {
  return `<svg class="arrow-svg" viewBox="0 0 118 16" xmlns="http://www.w3.org/2000/svg">
    <line x1="2" y1="8" x2="100" y2="8" stroke="#4a6fa5" stroke-width="2.2"/>

  </svg>`;
}

function buildTable(containerId, data, headerLabel, totalVal) {
  const wrap = document.getElementById(containerId);

  let html = `<div class="col-header">
    <div class="ch ch-idx"></div>
    <div class="ch ch-name">NAME</div>
    <div class="ch ch-staff">${headerLabel}</div>
    <div class="ch ch-adv">ADVANCE</div>
    <div class="ch ch-net">NET PAYBLE</div>
    <div class="ch ch-box"></div>
  </div>`;

  data.forEach(([idx, name, adv, net]) => {
    const boldNet = net > 0 ? ' bold-net' : '';
    const netStr = net.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    html += `<div class="row">
      <div class="cell cell-idx">${idx}</div>
      <div class="cell cell-name">${name}</div>
      <div class="cell cell-arrow">${arrowSVG()}</div>
      <div class="cell cell-num">${adv}</div>
      <div class="cell cell-num${boldNet}">${netStr}</div>
      <div class="cell cell-box"></div>
    </div>`;
  });

  const totalStr = totalVal.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  html += `<div class="row total-row">
    <div class="cell cell-idx"></div>
    <div class="cell cell-name"></div>
    <div class="cell cell-arrow"></div>
    <div class="cell cell-num"></div>
    <div class="cell cell-num bold-net total-num">${totalStr}</div>
    <div class="cell cell-box"></div>
  </div>`;

  wrap.innerHTML = html;
}
