<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0005"/>
      <stop offset="100%" stop-color="#0d0810"/>
    </linearGradient>
    <linearGradient id="gr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63000"/>
      <stop offset="100%" stop-color="#ff6633"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle top-left glow -->
  <ellipse cx="8" cy="8" rx="18" ry="18" fill="rgba(230,48,0,0.18)"/>
  <!-- Letter A - bold, centered -->
  <text
    x="32" y="46"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="44"
    letter-spacing="-2"
    fill="url(#gr)"
    filter="url(#glow)"
  >A</text>
  <!-- Underline accent dot -->
  <circle cx="32" cy="57" r="3" fill="#ff6633" opacity="0.8"/>
</svg>
